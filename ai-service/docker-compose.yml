# Development convenience: build + run with live reload.
# Production: run the built image without the volume mount / --reload override
# (the Dockerfile CMD already runs a plain uvicorn server).
services:
  ai:
    build: .
    image: mediapipe-ai:dev
    container_name: mediapipe-ai
    ports:
      - "8001:8001"
    env_file:
      - .env.example
    environment:
      ENVIRONMENT: development
    volumes:
      - ./app:/app/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8001", "--reload"]
    restart: unless-stopped
